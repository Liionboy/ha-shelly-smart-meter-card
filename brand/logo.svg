<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#eab308"/>
    </linearGradient>
    <linearGradient id="solar" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fb923c"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="grid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="house" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="128" x2="512" y2="128" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="#fff" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="#fff" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="#fff" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Solar Panel (top-left) -->
  <g filter="url(#shadow)" transform="translate(60, 80)">
    <rect x="0" y="0" width="130" height="90" rx="10" fill="url(#solar)" opacity="0.9"/>
    <line x1="0" y1="22" x2="130" y2="22" stroke="#fff" stroke-width="1.5" opacity="0.3"/>
    <line x1="0" y1="45" x2="130" y2="45" stroke="#fff" stroke-width="1.5" opacity="0.3"/>
    <line x1="0" y1="68" x2="130" y2="68" stroke="#fff" stroke-width="1.5" opacity="0.3"/>
    <line x1="32" y1="0" x2="32" y2="90" stroke="#fff" stroke-width="1.5" opacity="0.3"/>
    <line x1="65" y1="0" x2="65" y2="90" stroke="#fff" stroke-width="1.5" opacity="0.3"/>
    <line x1="98" y1="0" x2="98" y2="90" stroke="#fff" stroke-width="1.5" opacity="0.3"/>
    <!-- Sun rays -->
    <circle cx="115" cy="-10" r="14" fill="#fbbf24" opacity="0.6"/>
    <g stroke="#fbbf24" stroke-width="2" opacity="0.4">
      <line x1="115" y1="-30" x2="115" y2="-38"/>
      <line x1="130" y1="-22" x2="136" y2="-28"/>
      <line x1="135" y1="-10" x2="143" y2="-10"/>
      <line x1="100" y1="-22" x2="94" y2="-28"/>
      <line x1="95" y1="-10" x2="87" y2="-10"/>
    </g>
  </g>

  <!-- House (center) -->
  <g filter="url(#shadow)" transform="translate(195, 180)">
    <!-- Roof -->
    <polygon points="60,0 0,50 120,50" fill="url(#house)" opacity="0.85"/>
    <!-- Body -->
    <rect x="15" y="50" width="90" height="70" rx="4" fill="url(#house)" opacity="0.7"/>
    <!-- Door -->
    <rect x="42" y="75" width="36" height="45" rx="4" fill="#1a1a2e" opacity="0.5"/>
    <!-- Window left -->
    <rect x="22" y="60" width="18" height="18" rx="3" fill="#fbbf24" opacity="0.6"/>
    <!-- Window right -->
    <rect x="80" y="60" width="18" height="18" rx="3" fill="#fbbf24" opacity="0.6"/>
    <!-- Lightning bolt on house -->
    <path d="M65,58 L55,80 L63,80 L57,98 L73,75 L65,75 L71,58 Z" fill="#fbbf24" opacity="0.8"/>
  </g>

  <!-- Transmission Tower / Grid (right) -->
  <g filter="url(#shadow)" transform="translate(340, 100)">
    <!-- Tower base -->
    <path d="M40,0 L20,80 L60,80 Z" fill="none" stroke="url(#grid)" stroke-width="4" opacity="0.9"/>
    <path d="M40,0 L10,120 L70,120 Z" fill="none" stroke="url(#grid)" stroke-width="3" opacity="0.7"/>
    <!-- Cross beams -->
    <line x1="25" y1="40" x2="55" y2="40" stroke="url(#grid)" stroke-width="3" opacity="0.8"/>
    <line x1="20" y1="65" x2="60" y2="65" stroke="url(#grid)" stroke-width="3" opacity="0.8"/>
    <line x1="15" y1="90" x2="65" y2="90" stroke="url(#grid)" stroke-width="3" opacity="0.8"/>
    <!-- Insulators -->
    <circle cx="25" cy="40" r="4" fill="#a78bfa"/>
    <circle cx="55" cy="40" r="4" fill="#a78bfa"/>
    <circle cx="20" cy="65" r="4" fill="#a78bfa"/>
    <circle cx="60" cy="65" r="4" fill="#a78bfa"/>
    <!-- Power lines -->
    <path d="M25,40 Q-20,60 15,90" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.5"/>
    <path d="M55,40 Q100,60 65,90" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Flow Arrows -->
  <!-- Solar → House -->
  <g filter="url(#glow)">
    <path d="M190,160 C220,170 230,190 240,210" fill="none" stroke="#22c55e" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    <polygon points="240,210 232,198 248,202" fill="#22c55e" opacity="0.8"/>
  </g>
  <!-- House → Grid -->
  <g filter="url(#glow)">
    <path d="M310,240 C330,230 340,210 355,190" fill="none" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <polygon points="355,190 343,198 347,183" fill="#8b5cf6" opacity="0.7"/>
  </g>

  <!-- Central Lightning Bolt (main icon) -->
  <g filter="url(#glow)" transform="translate(220, 310)">
    <path d="M40,0 L15,50 L32,50 L8,100 L65,42 L45,42 L60,0 Z" fill="url(#bolt)"/>
    <path d="M40,0 L15,50 L32,50 L8,100 L65,42 L45,42 L60,0 Z" fill="#fff" opacity="0.15"/>
  </g>

  <!-- 3-Phase indicator dots -->
  <g transform="translate(160, 440)">
    <circle cx="0" cy="0" r="8" fill="#ef4444" opacity="0.9"/>
    <circle cx="30" cy="0" r="8" fill="#22c55e" opacity="0.9"/>
    <circle cx="60" cy="0" r="8" fill="#3b82f6" opacity="0.9"/>
    <text x="0" y="24" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="system-ui" font-weight="600">A</text>
    <text x="30" y="24" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="system-ui" font-weight="600">B</text>
    <text x="60" y="24" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="system-ui" font-weight="600">C</text>
  </g>

  <!-- "3Φ" badge -->
  <g transform="translate(370, 410)">
    <rect x="0" y="0" width="60" height="32" rx="10" fill="#f59e0b" opacity="0.2"/>
    <text x="30" y="22" text-anchor="middle" fill="#f59e0b" font-size="18" font-family="system-ui" font-weight="800">3Φ</text>
  </g>

  <!-- Brand text -->
  <text x="256" y="490" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="system-ui" font-weight="400" letter-spacing="2">SHELLY SMART METER</text>
</svg>
